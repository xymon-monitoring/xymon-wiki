site_name: Xymon Wiki
site_description: Collaborative knowledge base for the Xymon monitoring ecosystem
site_url: https://xymon-monitoring.github.io/xymon-wiki/
repo_url: https://github.com/xymon-monitoring/xymon-wiki
repo_name: xymon-monitoring/xymon-wiki
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    # Dark (classic Xymon look) is the default; toggle to light.
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

plugins:
  - search

extra_css:
  - stylesheets/xymon.css

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

nav:
  - Home: index.md
  - About:
      - History of Xymon: about/history-of-xymon.md
      - Project & community: about/project-and-community.md
  - Guides:
      - Xymon server documentation: guides/server-documentation.md
      - Compile Xymon: guides/how-to-compile-xymon.md
      - Client / Server communication: guides/client-server-communication.md
  - Windows PowerShell client:
      - clients/windows-powershell/index.md
      - Installation: clients/windows-powershell/installation.md
      - Local settings: clients/windows-powershell/local-settings.md
      - Remote settings: clients/windows-powershell/remote-settings.md
  - Contributing:
      - C coding guidelines: contributing/c-coding-contribution-guidelines.md
      - AI agent directives: contributing/ai-agent-contribution-directives.md
  - Development:
      - Legacy SourceForge/SVN guide: development/developer-guide-legacy-sourceforge-svn.md
